<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Koloi - Get picked. Get moving.</title>
    <meta name="description" content="Koloi is Zimbabwe's premier e-hailing service. Request a ride, hop in, and go. Drive when you want, earn what you need." />
    <meta name="author" content="Koloi Technologies" />

    <!-- PWA Meta Tags -->
     <meta name="theme-color" content="#0b3b78" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Koloi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Koloi" />
     <meta name="msapplication-TileColor" content="#0b3b78" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/koloi-logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/koloi-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/koloi-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/koloi-logo.png" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Koloi - Get picked. Get moving." />
    <meta property="og:description" content="Zimbabwe's premier e-hailing service. Request a ride, hop in, and go." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@koloiapp" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Safe area insets for notch devices -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
         --navH: 56px;
         --pad: 14px;
      }
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
       
       /* Ensure app fills entire screen on mobile */
       html, body, #root {
         height: 100%;
         min-height: 100vh;
         min-height: 100dvh;
       }
    </style>
  </head>

  <body>
     <!-- In-app launch screen (guaranteed to show while app loads) -->
     <div id="launch" style="position:fixed; inset:0; background:#0b3b78; display:flex; align-items:center; justify-content:center; z-index:999999;">
       <img src="/icons/koloi-launch.png" alt="Koloi" style="width:120px; height:120px; border-radius:24px; animation: pulse 1.5s ease-in-out infinite;" />
     </div>
     <style>
       @keyframes pulse {
         0%, 100% { transform: scale(1); opacity: 1; }
         50% { transform: scale(1.05); opacity: 0.9; }
       }
     </style>
     <script>
       window.addEventListener('load', function() {
         setTimeout(function() {
           var el = document.getElementById('launch');
           if (el) {
             el.style.transition = 'opacity 0.3s ease-out';
             el.style.opacity = '0';
             setTimeout(function() { el.remove(); }, 300);
           }
         }, 700);
       });
     </script>
     
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
