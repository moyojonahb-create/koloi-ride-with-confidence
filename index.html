<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Voyex - Your ride, your way.</title>
    <meta name="description" content="Voyex is Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta name="author" content="Voyex Technologies" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0B3D91" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1b3e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Voyex" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Voyex" />
    <meta name="msapplication-TileColor" content="#0B3D91" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-152x152.png" />

    <!-- iOS Splash / Launch Images -->
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/koloi-launch.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Voyex - Your ride, your way." />
    <meta property="og:description" content="Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@voyexapp" />

    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Safe area insets for notch devices -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --navH: 56px;
        --pad: 14px;
      }
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
       
      html, body, #root {
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
      }
       
      #root {
        padding-top: env(safe-area-inset-top, 0px);
      }
       
      * {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }
       
      p, span, h1, h2, h3, h4, h5, h6, label, a, button {
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <div id="instant-splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#ffffff;">
      <img src="/icons/voyex-splash.png" alt="" style="width:256px;height:256px;object-fit:contain;" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
