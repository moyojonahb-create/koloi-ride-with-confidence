<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Voyex - Your ride, your way.</title>
    <meta name="description" content="Voyex is Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta name="author" content="Voyex Technologies" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0B3D91" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Voyex" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Voyex" />
    <meta name="msapplication-TileColor" content="#0B3D91" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/voyex-logo.png" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Voyex - Your ride, your way." />
    <meta property="og:description" content="Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@voyexapp" />

    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Safe area insets for notch devices -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --navH: 56px;
        --pad: 14px;
      }
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
       
      html, body, #root {
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
      }
       
      #root {
        padding-top: env(safe-area-inset-top, 12px);
      }
       
      * {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }
       
      p, span, h1, h2, h3, h4, h5, h6, label, a, button {
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-word;
      }
    </style>
  </head>

  <body style="background:#0a1628;">
    <!-- Instant splash to prevent white flash -->
    <div id="instant-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a1628 0%,#0d2847 40%,#112d4e 70%,#0a1628 100%);">
      <div style="width:192px;height:192px;border-radius:50%;background:conic-gradient(from 0deg,#FFC107,#FFD54F,#FFC107,#F9A825,#FFC107);padding:5px;box-shadow:0 0 60px 15px rgba(255,193,7,0.3);">
        <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(145deg,#0d2847,#112d4e);display:flex;align-items:center;justify-content:center;">
          <img src="/icons/voyex-logo.png" alt="" style="width:112px;height:112px;object-fit:contain;" />
        </div>
      </div>
      <div style="margin-top:32px;font-size:36px;font-weight:700;color:#fff;font-family:system-ui,sans-serif;letter-spacing:1px;">Voyex</div>
      <div style="margin-top:12px;font-size:12px;color:rgba(255,193,7,0.75);font-family:system-ui,sans-serif;letter-spacing:3px;text-transform:uppercase;">Move Smart Across Zimbabwe</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
