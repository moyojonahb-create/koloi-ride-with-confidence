<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Voyex - Your ride, your way.</title>
    <meta name="description" content="Voyex is Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta name="author" content="Voyex Technologies" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0B3D91" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Voyex" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Voyex" />
    <meta name="msapplication-TileColor" content="#0B3D91" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/voyex-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/voyex-logo.png" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Voyex - Your ride, your way." />
    <meta property="og:description" content="Zimbabwe's premier ride-hailing service. Request a ride anywhere in Zimbabwe." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@voyexapp" />

    <!-- Leaflet CSS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Safe area insets for notch devices -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --navH: 56px;
        --pad: 14px;
      }
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
       
      html, body, #root {
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
      }
       
      #root {
        padding-top: env(safe-area-inset-top, 12px);
      }
       
      * {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }
       
      p, span, h1, h2, h3, h4, h5, h6, label, a, button {
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-word;
      }
    </style>
  </head>

  <body style="background:#061A3A;">
    <!-- Instant splash to prevent white flash -->
    <div id="instant-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(170deg,#061A3A 0%,#0B2E5C 25%,#0D3B7A 50%,#0A2D5E 75%,#051530 100%);">
      <div style="width:200px;height:200px;border-radius:50%;background:conic-gradient(from 0deg,#FFD54F,#FFC107,#FFB300,#FFC107,#FFD54F,#FFC107);padding:6px;box-shadow:0 4px 30px rgba(255,193,7,0.35),0 0 80px 25px rgba(255,193,7,0.2);">
        <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(145deg,#0A2D5E,#0D3B7A,#082348);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 4px 15px rgba(0,0,0,0.4);">
          <svg width="80" height="58" viewBox="0 0 90 65" fill="none"><path d="M15,42 L20,25 Q22,20 28,18 L62,18 Q68,20 70,25 L75,42" fill="white"/><path d="M28,18 L32,8 Q34,5 38,5 L52,5 Q56,5 58,8 L62,18" fill="white"/><path d="M32,17 L35,9 Q36,7 39,7 L51,7 Q54,7 55,9 L58,17" fill="rgba(30,80,160,0.7)"/><rect x="10" y="38" width="70" height="14" rx="4" fill="white"/><rect x="12" y="40" width="10" height="5" rx="2" fill="#FFD54F"/><rect x="68" y="40" width="10" height="5" rx="2" fill="#FFD54F"/><rect x="32" y="42" width="26" height="4" rx="2" fill="rgba(30,80,160,0.4)"/><circle cx="25" cy="52" r="7" fill="#1a1a1a"/><circle cx="25" cy="52" r="4" fill="#555"/><circle cx="65" cy="52" r="7" fill="#1a1a1a"/><circle cx="65" cy="52" r="4" fill="#555"/></svg>
        </div>
      </div>
      <div style="margin-top:32px;font-size:52px;font-weight:800;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:2px;text-shadow:0 2px 30px rgba(255,193,7,0.25);">Voyex</div>
      <div style="margin-top:12px;font-size:14px;color:rgba(255,255,255,0.85);font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:2.5px;text-transform:uppercase;">Smart Social Ridesharing</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
